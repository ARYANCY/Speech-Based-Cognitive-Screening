# Render configuration file (optional - you can also configure via UI)
services:
  - type: web
    name: dementia-detection-backend
    env: node
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add CORS_ORIGIN after frontend is deployed
      # - key: CORS_ORIGIN
      #   value: https://your-frontend.vercel.app

